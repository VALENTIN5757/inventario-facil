<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista | Inventario Facil</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div>
        <strong>INVENTARIO FACIL</strong>
    </div>
    <nav>
        <a href="index.html">INICIO</a>
        <span>|</span>
        <a href="registrar.html">REGISTRAR</a>
        <span>|</span>
        <a href="lista.html" class="activo">LISTA</a>
        <span>|</span>
        <a href="productos.html">PRODUCTOS</a>
        <span>|</span>
        <a href="acerca.html">ACERCA DE</a>
        <span>|</span>
        <a href="ayuda.html">AYUDA</a>
    </nav>
</header>

<main class="contenedor-lista">
    <h2>LISTADO DE PRODUCTOS</h2>

    <div class="buscador">
        <label>Buscar:</label>
        <input type="text" placeholder="Escriba codigo o nombre...">
        <button class="btn-buscar">🔍 BUSCAR</button>
    </div>

    <table class="tabla-productos">
        <thead>
            <tr>
                <th>Codigo</th>
                <th>Nombre</th>
                <th>Categoria</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5" class="sin-productos">
                    No hay productos registrados en este momento
                </td>
            </tr>
        </tbody>
    </table>

    <div class="acciones">
    <a href="registrar.html" class="btn-azul"> Editar</a>
    <button class="btn-rojo"> Eliminar</button>
    <a href="productos.html" class="btn-azul"> Ver detalles</a>
</div>
    
</main>

<footer>
    © 2026 Inventario Facil | Todos los derechos reservados
</footer>

</body>
</html>
