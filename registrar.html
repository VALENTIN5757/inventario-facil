<main class="contenedor-registro">
    <h2>FORMULARIO DE REGISTRO</h2>

    <form class="formulario">
        <div class="campo">
            <label>Nombre del producto:</label>
            <input type="text" required>
        </div>

        <div class="campo">
            <label>Código único:</label>
            <input type="text" id="codigo">
            <button type="button" class="boton-escanear" title="Escanear código de barras">📟</button>
        </div>

        <div class="campo">
            <label>Categoría:</label>
            <input type="text">
        </div>

        <div class="campo">
            <label>Cantidad en stock:</label>
            <input type="number" min="0" step="1" placeholder="Ej: 2000">
        </div>

        <div class="campo">
            <label>Precio unitario:</label>
            <span class="simbolo-precio">$</span>
            <input type="number" min="0" step="0.01" placeholder="Ej: 15500">
        </div>

        <div class="campo">
            <label>Descripción:</label>
            <input type="text">
        </div>

        <div class="botones">
            <button type="submit" class="btn-azul">GUARDAR</button>
            <button type="reset" class="btn-blanco">LIMPIAR CAMPOS</button>
        </div>
    </form>
</main>
